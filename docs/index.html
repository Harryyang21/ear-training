<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Ear Training</title>
  <!-- build: 20260527c -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <label class="metronome-toggle" title="Metronome · 节拍器">
        <input id="metronome" type="checkbox" checked>
        <span>节拍</span>
      </label>
      <h1>Ear Training</h1>
      <p id="subtitle" class="subtitle">2 beats listen · auto answer</p>
    </header>

    <section class="controls">
      <div class="control-row" id="modeSourceRow">
        <label>
          Mode
          <select id="mode">
            <option value="passive">Passive Quick · 被动快速</option>
            <option value="interactive">Find the Key · 找键答题</option>
          </select>
        </label>
        <label id="audioSourceWrap">
          Audio · 音源
          <select id="audioSource">
            <option value="github">GitHub Pages</option>
            <option value="custom">Custom CDN · 国内加速</option>
          </select>
        </label>
      </div>
      <div class="control-row">
        <label>
          Instrument · 音色
          <select id="instrument">
            <option value="piano">Piano · 钢琴</option>
            <option value="violin">Violin · 小提琴</option>
            <option value="guitar">Guitar · 吉他</option>
            <option value="guzheng">Guzheng · 古筝</option>
            <option value="erhu">Erhu · 二胡</option>
            <option value="harp">Harp · 竖琴</option>
            <option value="saxophone">Saxophone · 萨克斯</option>
          </select>
        </label>
        <label>
          Range
          <select id="level">
            <option value="beginner">Beginner C4-C5</option>
            <option value="regular">Regular G3-G4</option>
            <option value="advanced" selected>Advanced C3-C5</option>
          </select>
        </label>
      </div>
      <div class="control-row">
        <label>
          BPM
          <input id="bpm" type="number" min="40" max="120" value="60">
        </label>
        <label>
          Notes
          <input id="numNotes" type="number" min="5" max="500" value="300">
        </label>
      </div>
    </section>

    <section class="play-area">
      <div class="display-area">
        <div class="display-panel">
          <div id="noteDisplay" class="note-display">?</div>
          <div id="progress" class="progress">Tap Start to begin</div>
        </div>
      </div>

      <div class="keyboard-wrap">
        <div id="pianoKeyboard" class="piano-keyboard" aria-label="Piano keyboard"></div>
      </div>
    </section>

    <section class="actions">
      <button id="startBtn" class="btn primary">Start</button>
      <button id="stopBtn" class="btn" disabled>Stop</button>
    </section>

    <p id="status" class="status"></p>
    <p id="help" class="help"></p>

    <footer class="footer">
      <p>© Hao Yang</p>
      <p><a href="mailto:hyang@shanghaitech.edu.cn">hyang@shanghaitech.edu.cn</a></p>
    </footer>
  </div>

  <script>
    // Optional mirror when not hosted on COS. On COS static site, same-origin /samples/ is used.
    window.EAR_TRAINING_CUSTOM_CDN = "https://ear-training-1314657814.cos.ap-hongkong.myqcloud.com";
  </script>
  <script src="app.js?v=20260527c"></script>
</body>
</html>
