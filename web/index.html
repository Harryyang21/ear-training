<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Ear Training</title>
  <!-- build: 20260531d -->
  <link rel="stylesheet" href="styles.css?v=20260531d">
</head>
<body>
  <div class="app">
    <header class="header">
      <label class="metronome-toggle" title="Metronome">
        <input id="metronome" type="checkbox" checked>
        <span>Click</span>
      </label>
      <h1>Ear Training</h1>
      <p id="subtitle" class="subtitle">Two beats · auto reveal</p>
      <p class="practice-time"><a id="practiceTimeLink" class="practice-link" href="stats.html">Practiced 0:00</a></p>
    </header>

    <section class="controls">
      <div class="controls-panel">
        <div class="control-row control-row-single">
          <label class="field">
            <span class="field-label">Mode</span>
            <select id="mode">
              <option value="passive">Passive</option>
              <option value="interactive">Interactive</option>
              <option value="bass">Bass</option>
              <option value="intervals">Intervals</option>
              <option value="melody">Melody</option>
              <option value="chords">Chords</option>
            </select>
          </label>
        </div>

        <div id="chordOptionsRow" class="control-row control-row-single hidden">
          <label class="field">
            <span class="field-label">Chord set</span>
            <select id="chordSet">
              <option value="c-major-triads">C major triads</option>
              <option value="c-major-triads-inv">C major triads + inversions</option>
              <option value="a-minor-triads">A minor triads</option>
              <option value="a-minor-triads-inv">A minor triads + inversions</option>
              <option value="c-major-7ths">C major 7ths</option>
              <option value="c-major-7ths-inv">C major 7ths + inversions</option>
              <option value="progressions">Progressions</option>
            </select>
          </label>
        </div>

        <div id="intervalOptionsRow" class="control-row control-row-single hidden">
          <label class="field">
            <span class="field-label">Interval style</span>
            <select id="intervalStyle">
              <option value="random">Harmonic / melodic</option>
              <option value="harmonic">Harmonic</option>
              <option value="melodic">Melodic</option>
            </select>
          </label>
        </div>

        <div class="control-row">
          <label class="field">
            <span class="field-label">Instrument</span>
            <select id="instrument">
              <option value="piano">Piano</option>
              <option value="violin">Violin</option>
              <option value="guitar">Guitar</option>
              <option value="guzheng">Guzheng</option>
              <option value="erhu">Erhu</option>
              <option value="harp">Harp</option>
              <option value="saxophone">Saxophone</option>
            </select>
          </label>
          <label class="field">
            <span class="field-label">Range</span>
            <select id="level">
              <option value="beginner">Beginner C4-C5</option>
              <option value="regular">Regular G3-G4</option>
              <option value="advanced" selected>Advanced C3-C5</option>
            </select>
          </label>
        </div>

        <div class="control-row">
          <label class="field">
            <span class="field-label">BPM</span>
            <input id="bpm" type="number" min="40" max="120" value="60">
          </label>
          <label class="field">
            <span class="field-label">Notes</span>
            <input id="numNotes" type="number" min="5" max="500" value="300">
          </label>
        </div>
      </div>
    </section>

    <section class="play-area">
      <div class="display-area">
        <div class="display-panel">
          <div id="noteDisplay" class="note-display">?</div>
          <div id="progress" class="progress">Loading samples...</div>
        </div>
      </div>

      <div class="keyboard-wrap">
        <div id="pianoKeyboard" class="piano-keyboard" aria-label="Piano keyboard"></div>
      </div>
    </section>

    <section class="transport">
      <button id="refABtn" class="btn tool" type="button" disabled>A440</button>
      <button id="replayBtn" class="btn tool" type="button" disabled>Replay</button>
      <button id="startBtn" class="btn primary" disabled>Start</button>
      <button id="stopBtn" class="btn" disabled>Stop</button>
    </section>

    <p id="status" class="status"></p>
    <p id="help" class="help"></p>

    <footer class="footer">
      <p>© Hao Yang</p>
      <p><a href="mailto:hyang@shanghaitech.edu.cn">hyang@shanghaitech.edu.cn</a></p>
    </footer>
  </div>

  <script>
    window.EAR_TRAINING_CUSTOM_CDN = "https://ear-training-1314657814.cos.ap-hongkong.myqcloud.com";
  </script>
  <script src="app.js?v=20260531d"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
